<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Blueprint - Design & Track Workouts</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-white" style="background: linear-gradient(to bottom right, #0f172a, #0f172a);">
    <div id="root"></div>

    <!-- Load React first -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Then load our app -->
    <script>
        const { useState, useRef } = React;

        const App = () => {
            const [floorPlanSize] = useState({ width: 800, height: 600 });
            const [machines, setMachines] = useState([]);
            const [selectedMachine, setSelectedMachine] = useState(null);
            const [draggingMachine, setDraggingMachine] = useState(null);
            const [mode, setMode] = useState('design');
            const [showMachineForm, setShowMachineForm] = useState(false);
            const [newMachine, setNewMachine] = useState({
                name: '',
                type: 'barbell',
                x: 50,
                y: 50,
            });
            const [expandedMachine, setExpandedMachine] = useState(null);
            const [newWorkout, setNewWorkout] = useState({
                date: new Date().toISOString().split('T')[0],
                sets: [{ weight: '', reps: '' }]
            });
            const canvasRef = useRef(null);

            const machineTypes = {
                barbell: { color: '#ef4444', icon: '🏋️' },
                dumbbell: { color: '#f97316', icon: '💪' },
                cable: { color: '#eab308', icon: '⚙️' },
                machine: { color: '#06b6d4', icon: '🤖' },
                cardio: { color: '#8b5cf6', icon: '🏃' },
                bench: { color: '#ec4899', icon: '🛏️' },
                rack: { color: '#14b8a6', icon: '📦' }
            };

            const handleCanvasClick = (e) => {
                if (mode === 'design' && showMachineForm && canvasRef.current) {
                    const rect = canvasRef.current.getBoundingClientRect();
                    const x = Math.max(0, Math.min(e.clientX - rect.left, floorPlanSize.width - 60));
                    const y = Math.max(0, Math.min(e.clientY - rect.top, floorPlanSize.height - 60));
                    setNewMachine({ ...newMachine, x, y });
                }
            };

            const handleMouseDown = (e, machineId) => {
                if (mode === 'design') {
                    e.preventDefault();
                    setDraggingMachine(machineId);
                    setSelectedMachine(machineId);
                }
            };

            const handleMouseMove = (e) => {
                if (draggingMachine !== null && mode === 'design' && canvasRef.current) {
                    const rect = canvasRef.current.getBoundingClientRect();
                    const x = Math.max(0, Math.min(e.clientX - rect.left, floorPlanSize.width - 60));
                    const y = Math.max(0, Math.min(e.clientY - rect.top, floorPlanSize.height - 60));
                    setMachines(machines.map(m => m.id === draggingMachine ? { ...m, x, y } : m));
                }
            };

            const handleMouseUp = () => {
                setDraggingMachine(null);
            };

            const addMachine = () => {
                if (newMachine.name.trim()) {
                    setMachines([...machines, { ...newMachine, id: Date.now(), workouts: [] }]);
                    setNewMachine({ name: '', type: 'barbell', x: 50, y: 50 });
                    setShowMachineForm(false);
                }
            };

            const deleteMachine = (id) => {
                setMachines(machines.filter(m => m.id !== id));
                setSelectedMachine(null);
            };

            const addWorkout = (machineId) => {
                const allValid = newWorkout.sets.every(s => s.weight && s.reps);
                if (allValid) {
                    setMachines(machines.map(m => m.id === machineId ? { ...m, workouts: [...m.workouts, { ...newWorkout, id: Date.now() }] } : m));
                    setNewWorkout({ date: new Date().toISOString().split('T')[0], sets: [{ weight: '', reps: '' }] });
                }
            };

            const deleteWorkout = (machineId, workoutId) => {
                setMachines(machines.map(m => m.id === machineId ? { ...m, workouts: m.workouts.filter(w => w.id !== workoutId) } : m));
            };

            const updateSet = (setIndex, field, value) => {
                const updatedSets = [...newWorkout.sets];
                updatedSets[setIndex] = { ...updatedSets[setIndex], [field]: value };
                setNewWorkout({ ...newWorkout, sets: updatedSets });
            };

            const currentMachine = machines.find(m => m.id === selectedMachine);

            return React.createElement(
                'div',
                { onMouseMove: handleMouseMove, onMouseUp: handleMouseUp, onMouseLeave: handleMouseUp, className: 'min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white p-4 md:p-8' },
                React.createElement(
                    'div',
                    { className: 'max-w-7xl mx-auto mb-8' },
                    React.createElement('h1', { className: 'text-4xl md:text-5xl font-black mb-2 bg-gradient-to-r from-blue-400 via-cyan-400 to-blue-500 bg-clip-text text-transparent' }, 'GYM BLUEPRINT'),
                    React.createElement('p', { className: 'text-slate-400 text-lg mb-8' }, 'Design your gym layout & track progress'),
                    React.createElement(
                        'div',
                        { className: 'flex gap-3 mb-6' },
                        React.createElement('button', { onClick: () => setMode('design'), className: `px-6 py-3 rounded-lg font-semibold transition-all ${mode === 'design' ? 'bg-blue-600 shadow-lg shadow-blue-500/50' : 'bg-slate-800 hover:bg-slate-700'}` }, '🏗️ Design Layout'),
                        React.createElement('button', { onClick: () => setMode('track'), className: `px-6 py-3 rounded-lg font-semibold transition-all ${mode === 'track' ? 'bg-purple-600 shadow-lg shadow-purple-500/50' : 'bg-slate-800 hover:bg-slate-700'}` }, '📊 Track Workouts')
                    )
                ),
                React.createElement(
                    'div',
                    { className: 'max-w-7xl mx-auto grid lg:grid-cols-3 gap-6' },
                    React.createElement(
                        'div',
                        { className: 'lg:col-span-2' },
                        React.createElement(
                            'div',
                            {
                                ref: canvasRef,
                                onClick: handleCanvasClick,
                                style: {
                                    width: Math.min(floorPlanSize.width, 800),
                                    height: Math.min(floorPlanSize.height, 600),
                                    backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(148,163,184,0.1) 49px, rgba(148,163,184,0.1) 50px), repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(148,163,184,0.1) 49px, rgba(148,163,184,0.1) 50px)"
                                },
                                className: 'relative bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl border-2 border-slate-700 shadow-2xl cursor-crosshair overflow-hidden mx-auto'
                            },
                            machines.map(machine =>
                                React.createElement(
                                    'div',
                                    {
                                        key: machine.id,
                                        onMouseDown: (e) => handleMouseDown(e, machine.id),
                                        onClick: () => setSelectedMachine(machine.id),
                                        style: { position: 'absolute', left: machine.x, top: machine.y, cursor: 'grab' },
                                        className: 'select-none transition-all'
                                    },
                                    React.createElement(
                                        'div',
                                        {
                                            className: `w-14 h-14 rounded-lg flex items-center justify-center text-2xl font-bold shadow-lg transition-all ${selectedMachine === machine.id ? 'ring-4 ring-white shadow-2xl scale-110' : 'hover:shadow-xl'}`,
                                            style: { backgroundColor: machineTypes[machine.type]?.color }
                                        },
                                        machineTypes[machine.type]?.icon
                                    ),
                                    React.createElement('div', { className: 'text-xs font-bold mt-1 text-center text-slate-200 whitespace-nowrap bg-slate-900 bg-opacity-80 px-2 py-1 rounded' }, machine.name)
                                )
                            ),
                            showMachineForm && React.createElement(
                                'div',
                                { className: 'absolute inset-0 flex items-center justify-center bg-black bg-opacity-40 rounded-2xl' },
                                React.createElement(
                                    'div',
                                    { className: 'text-center' },
                                    React.createElement('p', { className: 'text-lg font-semibold mb-2' }, 'Click on canvas to place machine'),
                                    React.createElement('p', { className: 'text-sm text-slate-400' }, 'Or configure details in sidebar')
                                )
                            )
                        )
                    ),
                    React.createElement(
                        'div',
                        { className: 'space-y-4' },
                        showMachineForm && mode === 'design' && React.createElement(
                            'div',
                            { className: 'bg-gradient-to-br from-slate-800 to-slate-850 rounded-xl p-6 border border-blue-500 border-opacity-30 shadow-xl' },
                            React.createElement(
                                'div',
                                { className: 'flex items-center justify-between mb-4' },
                                React.createElement('h3', { className: 'text-lg font-bold' }, 'Add Machine'),
                                React.createElement('button', { onClick: () => setShowMachineForm(false), className: 'text-slate-400 hover:text-white' }, '✕')
                            ),
                            React.createElement('input', { type: 'text', placeholder: 'Machine name', value: newMachine.name, onChange: (e) => setNewMachine({ ...newMachine, name: e.target.value }), className: 'w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white placeholder-slate-500 focus:border-blue-500 outline-none mb-3' }),
                            React.createElement(
                                'select',
                                { value: newMachine.type, onChange: (e) => setNewMachine({ ...newMachine, type: e.target.value }), className: 'w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:border-blue-500 outline-none mb-3' },
                                Object.entries(machineTypes).map(([key, val]) =>
                                    React.createElement('option', { key, value: key }, `${val.icon} ${key.charAt(0).toUpperCase() + key.slice(1)}`)
                                )
                            ),
                            React.createElement('p', { className: 'text-xs text-slate-400 mb-4' }, `Position: (${Math.round(newMachine.x)}, ${Math.round(newMachine.y)})`),
                            React.createElement(
                                'div',
                                { className: 'flex gap-2' },
                                React.createElement('button', { onClick: addMachine, className: 'flex-1 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 rounded px-4 py-2 font-semibold' }, 'Add'),
                                React.createElement('button', { onClick: () => setShowMachineForm(false), className: 'flex-1 bg-slate-700 hover:bg-slate-600 rounded px-4 py-2 font-semibold' }, 'Cancel')
                            )
                        ),
                        mode === 'design' && !showMachineForm && React.createElement(
                            React.Fragment,
                            null,
                            React.createElement('button', { onClick: () => setShowMachineForm(true), className: 'w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 rounded-xl px-4 py-3 font-bold flex items-center justify-center gap-2 shadow-lg hover:shadow-xl' }, '➕ Add Machine'),
                            currentMachine && React.createElement(
                                'div',
                                { className: 'bg-gradient-to-br from-slate-800 to-slate-850 rounded-xl p-6 border border-yellow-500 border-opacity-30 shadow-xl' },
                                React.createElement(
                                    'div',
                                    { className: 'flex items-start justify-between mb-4' },
                                    React.createElement(
                                        'div',
                                        null,
                                        React.createElement('h3', { className: 'text-lg font-bold' }, currentMachine.name),
                                        React.createElement('p', { className: 'text-sm text-slate-400' }, currentMachine.type)
                                    ),
                                    React.createElement('div', { className: 'w-12 h-12 rounded-lg flex items-center justify-center text-2xl', style: { backgroundColor: machineTypes[currentMachine.type]?.color } }, machineTypes[currentMachine.type]?.icon)
                                ),
                                React.createElement(
                                    'div',
                                    { className: 'space-y-2 mb-4 text-sm' },
                                    React.createElement('p', null, React.createElement('span', { className: 'text-slate-400' }, 'Position: '), `(${Math.round(currentMachine.x)}, ${Math.round(currentMachine.y)})`),
                                    React.createElement('p', null, React.createElement('span', { className: 'text-slate-400' }, 'Workouts logged: '), currentMachine.workouts.length)
                                ),
                                React.createElement('button', { onClick: () => deleteMachine(currentMachine.id), className: 'w-full bg-red-600 hover:bg-red-500 rounded px-4 py-2 font-semibold' }, 'Delete Machine')
                            ),
                            machines.length > 0 && React.createElement(
                                'div',
                                { className: 'bg-slate-800 rounded-xl p-4 border border-slate-700' },
                                React.createElement('h3', { className: 'font-bold mb-3' }, `Machines (${machines.length})`),
                                React.createElement(
                                    'div',
                                    { className: 'space-y-2 max-h-64 overflow-y-auto' },
                                    machines.map(m =>
                                        React.createElement(
                                            'button',
                                            { key: m.id, onClick: () => setSelectedMachine(m.id), className: `w-full text-left px-3 py-2 rounded transition-all ${selectedMachine === m.id ? 'bg-blue-600 font-semibold' : 'bg-slate-700 hover:bg-slate-600'}` },
                                            React.createElement(
                                                'div',
                                                { className: 'flex items-center gap-2' },
                                                React.createElement('span', null, machineTypes[m.type]?.icon),
                                                React.createElement('span', { className: 'flex-1 truncate' }, m.name)
                                            )
                                        )
                                    )
                                )
                            )
                        ),
                        mode === 'track' && React.createElement(
                            React.Fragment,
                            null,
                            machines.length === 0 && React.createElement(
                                'div',
                                { className: 'bg-slate-800 rounded-xl p-6 border border-slate-700 text-center' },
                                React.createElement('p', { className: 'text-slate-400 mb-4' }, 'No machines yet. Design your floor plan first!'),
                                React.createElement('button', { onClick: () => setMode('design'), className: 'w-full bg-blue-600 hover:bg-blue-500 rounded px-4 py-2 font-semibold' }, 'Go to Design')
                            ),
                            machines.length > 0 && React.createElement(
                                React.Fragment,
                                null,
                                React.createElement(
                                    'div',
                                    { className: 'bg-slate-800 rounded-xl p-4 border border-slate-700' },
                                    React.createElement('h3', { className: 'font-bold mb-3' }, 'Your Machines'),
                                    React.createElement(
                                        'div',
                                        { className: 'space-y-2 max-h-96 overflow-y-auto' },
                                        machines.map(m =>
                                            React.createElement(
                                                'button',
                                                { key: m.id, onClick: () => setExpandedMachine(expandedMachine === m.id ? null : m.id), className: `w-full text-left px-3 py-3 rounded transition-all border ${expandedMachine === m.id ? 'bg-purple-600 border-purple-400' : 'bg-slate-700 border-slate-600 hover:bg-slate-600'}` },
                                                React.createElement(
                                                    'div',
                                                    { className: 'flex items-center justify-between' },
                                                    React.createElement(
                                                        'div',
                                                        { className: 'flex items-center gap-2' },
                                                        React.createElement('span', null, machineTypes[m.type]?.icon),
                                                        React.createElement('span', { className: 'font-semibold' }, m.name)
                                                    ),
                                                    React.createElement('span', { className: 'text-xs bg-black bg-opacity-30 px-2 py-1 rounded' }, m.workouts.length)
                                                )
                                            )
                                        )
                                    )
                                ),
                                expandedMachine && machines.find(m => m.id === expandedMachine) && React.createElement(
                                    'div',
                                    { className: 'bg-gradient-to-br from-slate-800 to-slate-850 rounded-xl p-6 border border-purple-500 border-opacity-30 shadow-xl max-h-screen overflow-y-auto' },
                                    React.createElement('h3', { className: 'text-lg font-bold mb-4' }, machines.find(m => m.id === expandedMachine)?.name),
                                    React.createElement(
                                        'div',
                                        { className: 'space-y-3 mb-6 pb-6 border-b border-slate-700' },
                                        React.createElement(
                                            'div',
                                            null,
                                            React.createElement('label', { className: 'block text-sm text-slate-300 mb-2' }, 'Date'),
                                            React.createElement('input', { type: 'date', value: newWorkout.date, onChange: (e) => setNewWorkout({ ...newWorkout, date: e.target.value }), className: 'w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white text-sm' })
                                        ),
                                        React.createElement(
                                            'div',
                                            null,
                                            React.createElement(
                                                'div',
                                                { className: 'flex items-center justify-between mb-3' },
                                                React.createElement('label', { className: 'text-sm text-slate-300 font-semibold' }, 'Number of Sets'),
                                                React.createElement(
                                                    'div',
                                                    { className: 'flex gap-2 items-center' },
                                                    React.createElement('button', { onClick: () => { if (newWorkout.sets.length > 1) setNewWorkout({ ...newWorkout, sets: newWorkout.sets.slice(0, -1) }) }, disabled: newWorkout.sets.length === 1, className: `px-3 py-1 rounded text-sm transition-all ${newWorkout.sets.length === 1 ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-red-600 hover:bg-red-500 text-white font-bold'}` }, '−'),
                                                    React.createElement('span', { className: 'px-4 py-1 bg-slate-700 rounded text-sm font-bold min-w-12 text-center' }, newWorkout.sets.length),
                                                    React.createElement('button', { onClick: () => setNewWorkout({ ...newWorkout, sets: [...newWorkout.sets, { weight: '', reps: '' }] }), className: 'px-3 py-1 rounded text-sm bg-slate-700 hover:bg-slate-600 text-white transition-all font-bold' }, '+')
                                                )
                                            ),
                                            React.createElement(
                                                'div',
                                                { className: 'space-y-2 max-h-48 overflow-y-auto' },
                                                newWorkout.sets.map((set, index) =>
                                                    React.createElement(
                                                        'div',
                                                        { key: index, className: 'flex gap-2 items-center bg-slate-700 bg-opacity-50 p-3 rounded' },
                                                        React.createElement('span', { className: 'text-sm font-semibold text-slate-300 min-w-10' }, `Set ${index + 1}`),
                                                        React.createElement('input', { type: 'number', placeholder: 'Weight', value: set.weight, onChange: (e) => updateSet(index, 'weight', e.target.value), className: 'flex-1 bg-slate-700 border border-slate-600 rounded px-2 py-1 text-white text-sm' }),
                                                        React.createElement('span', { className: 'text-slate-400 font-bold' }, '×'),
                                                        React.createElement('input', { type: 'number', placeholder: 'Reps', value: set.reps, onChange: (e) => updateSet(index, 'reps', e.target.value), className: 'flex-1 bg-slate-700 border border-slate-600 rounded px-2 py-1 text-white text-sm' })
                                                    )
                                                )
                                            )
                                        ),
                                        React.createElement('button', { onClick: () => addWorkout(expandedMachine), className: 'w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 rounded px-4 py-2 font-semibold' }, '📊 Log Workout')
                                    ),
                                    React.createElement(
                                        'div',
                                        null,
                                        React.createElement('h4', { className: 'font-bold text-sm text-slate-300 mb-3' }, 'History'),
                                        React.createElement(
                                            'div',
                                            { className: 'space-y-3 max-h-64 overflow-y-auto' },
                                            machines.find(m => m.id === expandedMachine)?.workouts.length === 0 ?
                                                React.createElement('p', { className: 'text-sm text-slate-500' }, 'No workouts logged yet') :
                                                machines.find(m => m.id === expandedMachine)?.workouts.sort((a, b) => new Date(b.date) - new Date(a.date)).map(workout =>
                                                    React.createElement(
                                                        'div',
                                                        { key: workout.id, className: 'bg-slate-700 rounded px-3 py-3 text-sm' },
                                                        React.createElement(
                                                            'div',
                                                            { className: 'flex items-center justify-between mb-2' },
                                                            React.createElement('p', { className: 'text-xs text-slate-400' }, new Date(workout.date).toLocaleDateString()),
                                                            React.createElement('button', { onClick: () => deleteWorkout(expandedMachine, workout.id), className: 'text-red-400 hover:text-red-300' }, '✕')
                                                        ),
                                                        React.createElement(
                                                            'div',
                                                            { className: 'space-y-1' },
                                                            workout.sets.map((set, idx) =>
                                                                React.createElement('p', { key: idx, className: 'font-semibold' }, `Set ${idx + 1}: ${set.weight}lbs × ${set.reps} reps`)
                                                            )
                                                        )
                                                    )
                                                )
                                        )
                                    )
                                )
                            )
                        )
                    )
                )
            );
        };

        // Render app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
