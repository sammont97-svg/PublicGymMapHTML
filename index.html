<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Blueprint - Design & Track Workouts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-ring { animation: pulseRing 2s ease-in-out infinite; }
        @keyframes pulseRing { 0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.4); } 50% { box-shadow: 0 0 0 8px rgba(99,102,241,0); } }
        .save-flash { animation: saveFlash 1.5s ease forwards; }
        @keyframes saveFlash { 0% { opacity:0; } 20% { opacity:1; } 80% { opacity:1; } 100% { opacity:0; } }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="text-white" style="background: #080c14;">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
    const { useState, useRef, useEffect, useCallback } = React;

    // ─── Auth Helpers ────────────────────────────────────────────────────────────
    const USERS_KEY = 'gymblueprint_users';
    const SESSION_KEY = 'gymblueprint_session';

    function getUsers() {
        try { return JSON.parse(localStorage.getItem(USERS_KEY) || '{}'); } catch { return {}; }
    }
    function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
    function getUserDataKey(username) { return `gymblueprint_data_${username}`; }
    function loadUserData(username) {
        try { return JSON.parse(localStorage.getItem(getUserDataKey(username)) || 'null'); } catch { return null; }
    }
    function saveUserData(username, data) {
        localStorage.setItem(getUserDataKey(username), JSON.stringify(data));
    }
    function getSession() {
        try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; }
    }
    function setSession(username) { sessionStorage.setItem(SESSION_KEY, JSON.stringify({ username })); }
    function clearSession() { sessionStorage.removeItem(SESSION_KEY); }

    // ─── Auth Screen ─────────────────────────────────────────────────────────────
    const AuthScreen = ({ onLogin }) => {
        const [tab, setTab] = useState('login');
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const [confirmPassword, setConfirmPassword] = useState('');
        const [error, setError] = useState('');
        const [success, setSuccess] = useState('');

        const handleLogin = () => {
            setError('');
            if (!username.trim() || !password) { setError('Please fill in all fields.'); return; }
            const users = getUsers();
            if (!users[username]) { setError('No account found with that username.'); return; }
            if (users[username].password !== btoa(password)) { setError('Incorrect password.'); return; }
            setSession(username);
            onLogin(username);
        };

        const handleRegister = () => {
            setError('');
            if (!username.trim() || !password || !confirmPassword) { setError('Please fill in all fields.'); return; }
            if (username.trim().length < 3) { setError('Username must be at least 3 characters.'); return; }
            if (password.length < 6) { setError('Password must be at least 6 characters.'); return; }
            if (password !== confirmPassword) { setError('Passwords do not match.'); return; }
            const users = getUsers();
            if (users[username.trim()]) { setError('Username already taken.'); return; }
            users[username.trim()] = { password: btoa(password), createdAt: Date.now() };
            saveUsers(users);
            setSuccess('Account created! Logging you in…');
            setTimeout(() => {
                setSession(username.trim());
                onLogin(username.trim());
            }, 800);
        };

        const handleKeyDown = (e) => {
            if (e.key === 'Enter') tab === 'login' ? handleLogin() : handleRegister();
        };

        return React.createElement(
            'div',
            { className: 'min-h-screen flex items-center justify-center px-4', style: { background: 'radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.12) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%), #080c14' } },
            React.createElement(
                'div',
                { className: 'w-full max-w-md fade-in' },
                // Logo
                React.createElement(
                    'div',
                    { className: 'text-center mb-10' },
                    React.createElement('div', { className: 'text-6xl mb-3' }, '🏋️'),
                    React.createElement('h1', { className: 'font-display text-5xl text-white mb-1' }, 'GYM BLUEPRINT'),
                    React.createElement('p', { className: 'text-slate-400 text-sm' }, 'Design your gym · Track your progress')
                ),
                // Card
                React.createElement(
                    'div',
                    { className: 'rounded-2xl border border-slate-700/60 overflow-hidden', style: { background: 'rgba(15,23,42,0.85)', backdropFilter: 'blur(20px)' } },
                    // Tabs
                    React.createElement(
                        'div',
                        { className: 'flex border-b border-slate-700/60' },
                        ['login', 'register'].map(t =>
                            React.createElement(
                                'button',
                                { key: t, onClick: () => { setTab(t); setError(''); setSuccess(''); }, className: `flex-1 py-4 text-sm font-semibold transition-all ${tab === t ? 'bg-indigo-600/20 text-indigo-300 border-b-2 border-indigo-500' : 'text-slate-500 hover:text-slate-300'}` },
                                t === 'login' ? '🔑  Sign In' : '✨  Create Account'
                            )
                        )
                    ),
                    // Form
                    React.createElement(
                        'div',
                        { className: 'p-8 space-y-4', onKeyDown: handleKeyDown },
                        // Username
                        React.createElement(
                            'div',
                            null,
                            React.createElement('label', { className: 'block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2' }, 'Username'),
                            React.createElement('input', {
                                type: 'text', value: username, onChange: e => setUsername(e.target.value), autoComplete: 'username',
                                placeholder: 'your_username',
                                className: 'w-full bg-slate-800/60 border border-slate-600/60 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-indigo-500 focus:outline-none transition-all'
                            })
                        ),
                        // Password
                        React.createElement(
                            'div',
                            null,
                            React.createElement('label', { className: 'block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2' }, 'Password'),
                            React.createElement('input', {
                                type: 'password', value: password, onChange: e => setPassword(e.target.value), autoComplete: tab === 'login' ? 'current-password' : 'new-password',
                                placeholder: '••••••••',
                                className: 'w-full bg-slate-800/60 border border-slate-600/60 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-indigo-500 focus:outline-none transition-all'
                            })
                        ),
                        // Confirm Password (register only)
                        tab === 'register' && React.createElement(
                            'div',
                            null,
                            React.createElement('label', { className: 'block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2' }, 'Confirm Password'),
                            React.createElement('input', {
                                type: 'password', value: confirmPassword, onChange: e => setConfirmPassword(e.target.value), autoComplete: 'new-password',
                                placeholder: '••••••••',
                                className: 'w-full bg-slate-800/60 border border-slate-600/60 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-indigo-500 focus:outline-none transition-all'
                            })
                        ),
                        // Error / success
                        error && React.createElement('div', { className: 'bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm' }, '⚠️  ' + error),
                        success && React.createElement('div', { className: 'bg-green-500/10 border border-green-500/30 rounded-xl px-4 py-3 text-green-400 text-sm' }, '✅  ' + success),
                        // Submit
                        React.createElement(
                            'button',
                            {
                                onClick: tab === 'login' ? handleLogin : handleRegister,
                                className: 'w-full py-3 rounded-xl font-bold text-white transition-all hover:opacity-90 active:scale-95 mt-2',
                                style: { background: 'linear-gradient(135deg, #4f46e5, #0891b2)' }
                            },
                            tab === 'login' ? 'Sign In →' : 'Create Account →'
                        ),
                        // Privacy note
                        React.createElement('p', { className: 'text-center text-xs text-slate-600 pt-2' }, '🔒 All data stored locally in your browser')
                    )
                )
            )
        );
    };

    // ─── Main App ────────────────────────────────────────────────────────────────
    const GymApp = ({ username, onLogout }) => {
        const [floorPlanSize] = useState({ width: 800, height: 600 });
        const [machines, setMachines] = useState([]);
        const [selectedMachine, setSelectedMachine] = useState(null);
        const [draggingMachine, setDraggingMachine] = useState(null);
        const [mode, setMode] = useState('design');
        const [showMachineForm, setShowMachineForm] = useState(false);
        const [newMachine, setNewMachine] = useState({ name: '', type: 'barbell', x: 50, y: 50 });
        const [expandedMachine, setExpandedMachine] = useState(null);
        const [newWorkout, setNewWorkout] = useState({ date: new Date().toISOString().split('T')[0], sets: [{ weight: '', reps: '' }] });
        const [saveIndicator, setSaveIndicator] = useState(false);
        const [showUserMenu, setShowUserMenu] = useState(false);
        const canvasRef = useRef(null);
        const saveTimerRef = useRef(null);

        // Load user data on mount
        useEffect(() => {
            const data = loadUserData(username);
            if (data && data.machines) setMachines(data.machines);
        }, [username]);

        // Auto-save whenever machines change
        const triggerSave = useCallback((machineData) => {
            clearTimeout(saveTimerRef.current);
            saveTimerRef.current = setTimeout(() => {
                saveUserData(username, { machines: machineData, lastSaved: Date.now() });
                setSaveIndicator(true);
                setTimeout(() => setSaveIndicator(false), 2000);
            }, 600);
        }, [username]);

        const updateMachines = useCallback((newMachines) => {
            setMachines(newMachines);
            triggerSave(newMachines);
        }, [triggerSave]);

        const machineTypes = {
            barbell: { color: '#ef4444', icon: '🏋️' },
            dumbbell: { color: '#f97316', icon: '💪' },
            cable: { color: '#eab308', icon: '⚙️' },
            machine: { color: '#06b6d4', icon: '🤖' },
            cardio: { color: '#8b5cf6', icon: '🏃' },
            bench: { color: '#ec4899', icon: '🛏️' },
            rack: { color: '#14b8a6', icon: '📦' }
        };

        const handleCanvasClick = (e) => {
            if (mode === 'design' && showMachineForm && canvasRef.current) {
                const rect = canvasRef.current.getBoundingClientRect();
                const x = Math.max(0, Math.min(e.clientX - rect.left, floorPlanSize.width - 60));
                const y = Math.max(0, Math.min(e.clientY - rect.top, floorPlanSize.height - 60));
                setNewMachine({ ...newMachine, x, y });
            }
        };

        const handleMouseDown = (e, machineId) => {
            if (mode === 'design') { e.preventDefault(); setDraggingMachine(machineId); setSelectedMachine(machineId); }
        };

        const handleMouseMove = (e) => {
            if (draggingMachine !== null && mode === 'design' && canvasRef.current) {
                const rect = canvasRef.current.getBoundingClientRect();
                const x = Math.max(0, Math.min(e.clientX - rect.left, floorPlanSize.width - 60));
                const y = Math.max(0, Math.min(e.clientY - rect.top, floorPlanSize.height - 60));
                const updated = machines.map(m => m.id === draggingMachine ? { ...m, x, y } : m);
                setMachines(updated);
            }
        };

        const handleMouseUp = () => {
            if (draggingMachine !== null) {
                triggerSave(machines);
                setDraggingMachine(null);
            }
        };

        const addMachine = () => {
            if (newMachine.name.trim()) {
                const updated = [...machines, { ...newMachine, id: Date.now(), workouts: [] }];
                updateMachines(updated);
                setNewMachine({ name: '', type: 'barbell', x: 50, y: 50 });
                setShowMachineForm(false);
            }
        };

        const deleteMachine = (id) => {
            updateMachines(machines.filter(m => m.id !== id));
            setSelectedMachine(null);
        };

        const addWorkout = (machineId) => {
            const allValid = newWorkout.sets.every(s => s.weight && s.reps);
            if (allValid) {
                const updated = machines.map(m => m.id === machineId ? { ...m, workouts: [...m.workouts, { ...newWorkout, id: Date.now() }] } : m);
                updateMachines(updated);
                setNewWorkout({ date: new Date().toISOString().split('T')[0], sets: [{ weight: '', reps: '' }] });
            }
        };

        const deleteWorkout = (machineId, workoutId) => {
            const updated = machines.map(m => m.id === machineId ? { ...m, workouts: m.workouts.filter(w => w.id !== workoutId) } : m);
            updateMachines(updated);
        };

        const updateSet = (setIndex, field, value) => {
            const updatedSets = [...newWorkout.sets];
            updatedSets[setIndex] = { ...updatedSets[setIndex], [field]: value };
            setNewWorkout({ ...newWorkout, sets: updatedSets });
        };

        const handleLogout = () => {
            clearSession();
            onLogout();
        };

        const currentMachine = machines.find(m => m.id === selectedMachine);
        const userData = loadUserData(username);
        const lastSaved = userData?.lastSaved ? new Date(userData.lastSaved).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : null;

        return React.createElement(
            'div',
            { onMouseMove: handleMouseMove, onMouseUp: handleMouseUp, onMouseLeave: handleMouseUp, className: 'min-h-screen text-white p-4 md:p-8', style: { background: 'radial-gradient(ellipse at 10% 10%, rgba(99,102,241,0.08) 0%, transparent 50%), radial-gradient(ellipse at 90% 90%, rgba(6,182,212,0.06) 0%, transparent 50%), #080c14' } },

            // ── Header ──────────────────────────────────────────────────────────
            React.createElement(
                'div',
                { className: 'max-w-7xl mx-auto mb-8' },
                React.createElement(
                    'div',
                    { className: 'flex items-start justify-between flex-wrap gap-4' },
                    // Left: logo + tabs
                    React.createElement(
                        'div',
                        null,
                        React.createElement(
                            'div',
                            { className: 'flex items-center gap-3 mb-4' },
                            React.createElement('span', { className: 'text-3xl' }, '🏋️'),
                            React.createElement('h1', { className: 'font-display text-5xl md:text-6xl bg-clip-text text-transparent', style: { backgroundImage: 'linear-gradient(135deg, #818cf8, #38bdf8)' } }, 'GYM BLUEPRINT')
                        ),
                        React.createElement(
                            'div',
                            { className: 'flex gap-2' },
                            React.createElement('button', { onClick: () => setMode('design'), className: `px-5 py-2.5 rounded-xl font-semibold text-sm transition-all ${mode === 'design' ? 'text-white shadow-lg' : 'bg-slate-800/60 hover:bg-slate-700/60 text-slate-400'}`, style: mode === 'design' ? { background: 'linear-gradient(135deg, #4f46e5, #0891b2)', boxShadow: '0 4px 20px rgba(79,70,229,0.4)' } : {} }, '🏗️  Design Layout'),
                            React.createElement('button', { onClick: () => setMode('track'), className: `px-5 py-2.5 rounded-xl font-semibold text-sm transition-all ${mode === 'track' ? 'text-white shadow-lg' : 'bg-slate-800/60 hover:bg-slate-700/60 text-slate-400'}`, style: mode === 'track' ? { background: 'linear-gradient(135deg, #7c3aed, #db2777)', boxShadow: '0 4px 20px rgba(124,58,237,0.4)' } : {} }, '📊  Track Workouts')
                        )
                    ),
                    // Right: user info
                    React.createElement(
                        'div',
                        { className: 'flex flex-col items-end gap-2' },
                        React.createElement(
                            'div',
                            { className: 'relative' },
                            React.createElement(
                                'button',
                                { onClick: () => setShowUserMenu(!showUserMenu), className: 'flex items-center gap-3 bg-slate-800/60 hover:bg-slate-700/60 border border-slate-700/60 rounded-xl px-4 py-2.5 transition-all' },
                                React.createElement('div', { className: 'w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold text-white', style: { background: 'linear-gradient(135deg, #4f46e5, #0891b2)' } }, username[0].toUpperCase()),
                                React.createElement('span', { className: 'text-sm font-semibold text-slate-200' }, username),
                                React.createElement('span', { className: 'text-slate-500 text-xs' }, showUserMenu ? '▲' : '▼')
                            ),
                            showUserMenu && React.createElement(
                                'div',
                                { className: 'absolute right-0 top-full mt-2 w-52 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl overflow-hidden z-50 fade-in' },
                                React.createElement('div', { className: 'px-4 py-3 border-b border-slate-700' },
                                    React.createElement('p', { className: 'text-xs text-slate-400' }, 'Signed in as'),
                                    React.createElement('p', { className: 'text-sm font-bold text-white' }, username)
                                ),
                                React.createElement('div', { className: 'px-4 py-3 border-b border-slate-700' },
                                    React.createElement('p', { className: 'text-xs text-slate-400' }, `${machines.length} machine${machines.length !== 1 ? 's' : ''} · ${machines.reduce((t, m) => t + m.workouts.length, 0)} workouts logged`)
                                ),
                                React.createElement(
                                    'button',
                                    { onClick: handleLogout, className: 'w-full text-left px-4 py-3 text-red-400 hover:bg-red-500/10 text-sm font-semibold transition-all' },
                                    '🚪  Sign Out'
                                )
                            )
                        ),
                        // Save indicator
                        React.createElement(
                            'div',
                            { className: 'flex items-center gap-1.5', style: { opacity: saveIndicator ? 1 : 0.4, transition: 'opacity 0.4s ease' } },
                            React.createElement('div', { className: 'w-1.5 h-1.5 rounded-full bg-green-400', style: saveIndicator ? { animation: 'pulseRing 1s ease' } : {} }),
                            React.createElement('p', { className: 'text-xs text-slate-500' }, saveIndicator ? 'Saved' : lastSaved ? `Last saved ${lastSaved}` : 'No saves yet')
                        )
                    )
                )
            ),

            // ── Main Grid ───────────────────────────────────────────────────────
            React.createElement(
                'div',
                { className: 'max-w-7xl mx-auto grid lg:grid-cols-3 gap-6' },

                // Canvas
                React.createElement(
                    'div',
                    { className: 'lg:col-span-2' },
                    React.createElement(
                        'div',
                        {
                            ref: canvasRef, onClick: handleCanvasClick,
                            style: { width: Math.min(floorPlanSize.width, 800), height: Math.min(floorPlanSize.height, 600), backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(148,163,184,0.06) 49px, rgba(148,163,184,0.06) 50px), repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(148,163,184,0.06) 49px, rgba(148,163,184,0.06) 50px)" },
                            className: 'relative rounded-2xl border border-slate-700/60 shadow-2xl cursor-crosshair overflow-hidden mx-auto',
                            style: { width: Math.min(floorPlanSize.width, 800), height: Math.min(floorPlanSize.height, 600), background: 'linear-gradient(135deg, #0d1526 0%, #0a1020 100%)', backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(148,163,184,0.05) 49px, rgba(148,163,184,0.05) 50px), repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(148,163,184,0.05) 49px, rgba(148,163,184,0.05) 50px)", border: '1px solid rgba(99,102,241,0.15)', cursor: showMachineForm && mode === 'design' ? 'crosshair' : 'default' }
                        },
                        machines.map(machine =>
                            React.createElement(
                                'div',
                                { key: machine.id, onMouseDown: (e) => handleMouseDown(e, machine.id), onClick: () => setSelectedMachine(machine.id), style: { position: 'absolute', left: machine.x, top: machine.y, cursor: mode === 'design' ? 'grab' : 'pointer' }, className: 'select-none transition-transform' },
                                React.createElement(
                                    'div',
                                    { className: `w-14 h-14 rounded-xl flex items-center justify-center text-2xl font-bold shadow-lg transition-all ${selectedMachine === machine.id ? 'ring-2 ring-white ring-offset-1 ring-offset-transparent scale-110' : 'hover:scale-105'}`, style: { backgroundColor: machineTypes[machine.type]?.color, boxShadow: selectedMachine === machine.id ? `0 0 20px ${machineTypes[machine.type]?.color}80` : `0 4px 12px ${machineTypes[machine.type]?.color}40` } },
                                    machineTypes[machine.type]?.icon
                                ),
                                React.createElement('div', { className: 'text-xs font-bold mt-1 text-center whitespace-nowrap px-2 py-0.5 rounded-md', style: { background: 'rgba(8,12,20,0.85)', color: '#e2e8f0', backdropFilter: 'blur(4px)' } }, machine.name)
                            )
                        ),
                        showMachineForm && mode === 'design' && React.createElement(
                            'div',
                            { className: 'absolute inset-0 flex items-center justify-center', style: { background: 'rgba(8,12,20,0.5)', backdropFilter: 'blur(2px)' } },
                            React.createElement('div', { className: 'text-center bg-slate-800/80 rounded-2xl px-8 py-6 border border-indigo-500/30' },
                                React.createElement('p', { className: 'text-lg font-semibold mb-1' }, '📍 Click to place machine'),
                                React.createElement('p', { className: 'text-sm text-slate-400' }, 'Or set details in the sidebar')
                            )
                        ),
                        machines.length === 0 && !showMachineForm && React.createElement(
                            'div',
                            { className: 'absolute inset-0 flex items-center justify-center' },
                            React.createElement('div', { className: 'text-center' },
                                React.createElement('p', { className: 'text-4xl mb-3' }, '🏗️'),
                                React.createElement('p', { className: 'text-slate-500 font-semibold' }, 'Your gym is empty'),
                                React.createElement('p', { className: 'text-slate-600 text-sm mt-1' }, 'Add a machine to get started')
                            )
                        )
                    )
                ),

                // Sidebar
                React.createElement(
                    'div',
                    { className: 'space-y-4' },

                    // ── Design mode sidebar ──────────────────────────────────
                    showMachineForm && mode === 'design' && React.createElement(
                        'div',
                        { className: 'rounded-2xl p-6 border fade-in', style: { background: 'rgba(15,23,42,0.9)', borderColor: 'rgba(99,102,241,0.3)' } },
                        React.createElement('div', { className: 'flex items-center justify-between mb-5' },
                            React.createElement('h3', { className: 'font-bold text-lg' }, '➕ Add Machine'),
                            React.createElement('button', { onClick: () => setShowMachineForm(false), className: 'text-slate-500 hover:text-white w-7 h-7 flex items-center justify-center rounded-lg hover:bg-slate-700 transition-all' }, '✕')
                        ),
                        React.createElement('input', { type: 'text', placeholder: 'Machine name…', value: newMachine.name, onChange: e => setNewMachine({ ...newMachine, name: e.target.value }), onKeyDown: e => e.key === 'Enter' && addMachine(), className: 'w-full bg-slate-800/60 border border-slate-600/60 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:border-indigo-500 focus:outline-none transition-all mb-3 text-sm' }),
                        React.createElement(
                            'select',

                            Object.entries(machineTypes).map(([key, val]) =>

                        React.createElement('p', { className: 'text-xs text-slate-500 mb-4' }, `📍 Position: (${Math.round(newMachine.x)}, ${Math.round(newMachine.y)})`),

                            React.createElement('button', { onClick: () => setShowMachineForm(false), className: 'flex-1 py-2.5 rounded-xl font-bold text-sm bg-slate-700/60 hover:bg-slate-600/60 transition-all' }, 'Cancel')

                    mode === 'design' && !showMachineForm && React.createElement(
                        React.Fragment, null,
                        React.createElement(
                            'button',

                            'div',

                            React.createElement('div', { className: 'flex items-center justify-between mb-4' },
                                React.createElement('div', null,
                                    React.createElement('h3', { className: 'font-bold' }, currentMachine.name),

                            'div',
                            { className: 'rounded-2xl p-4 border', style: { background: 'rgba(15,23,42,0.9)', borderColor: 'rgba(71,85,105,0.5)' } },

                            React.Fragment, null,
                            React.createElement(
                                'div',

                                                React.createElement('span', { className: 'text-sm font-bold w-6 text-center' }, newWorkout.sets.length),

                                            )
                                        ),
                                        React.createElement('div', { className: 'space-y-2 max-h-48 overflow-y-auto' },
                                            newWorkout.sets.map((set, index) =>

                                                    React.createElement('input', { type: 'number', placeholder: 'lbs', value: set.weight, onChange: e => updateSet(index, 'weight', e.target.value), className: 'flex-1 bg-slate-700/60 border border-slate-600/40 rounded-lg px-2 py-1.5 text-white text-sm focus:border-purple-500 focus:outline-none' }),
                                                    React.createElement('span', { className: 'text-slate-600 font-bold text-xs' }, '×'),
                                                    React.createElement('input', { type: 'number', placeholder: 'reps', value: set.reps, onChange: e => updateSet(index, 'reps', e.target.value), className: 'flex-1 bg-slate-700/60 border border-slate-600/40 rounded-lg px-2 py-1.5 text-white text-sm focus:border-purple-500 focus:outline-none' })
                                                )

                                ),

                                        machines.find(m => m.id === expandedMachine)?.workouts.length === 0

                                            : machines.find(m => m.id === expandedMachine)?.workouts.sort((a, b) => new Date(b.date) - new Date(a.date)).map(workout =>
                                                React.createElement('div', { key: workout.id, className: 'bg-slate-800/40 rounded-xl px-3 py-3 text-sm border border-slate-700/30' },
                                                    React.createElement('div', { className: 'flex items-center justify-between mb-2' },
                                                        React.createElement('p', { className: 'text-xs text-slate-400 font-medium' }, new Date(workout.date + 'T12:00:00').toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' })),
                                                        React.createElement('button', { onClick: () => deleteWorkout(expandedMachine, workout.id), className: 'text-slate-600 hover:text-red-400 transition-colors text-xs' }, '✕')
                                                    ),
                                                    React.createElement('div', { className: 'space-y-1' },
                                                        workout.sets.map((set, idx) =>
                                                            React.createElement('p', { key: idx, className: 'text-xs text-slate-300 font-medium' }, `Set ${idx + 1}: ${set.weight} lbs × ${set.reps} reps`)
                                                        )
                                                    )

                                    )
                                )
                            )

                    )
                )
            ),

            // Click outside to close user menu
            showUserMenu && React.createElement('div', { className: 'fixed inset-0 z-40', onClick: () => setShowUserMenu(false) })
        );
    };

    // ─── Root ────────────────────────────────────────────────────────────────────
    const Root = () => {
        const [currentUser, setCurrentUser] = useState(() => {
            const session = getSession();
            return session?.username || null;
        });

        const handleLogin = (username) => setCurrentUser(username);
        const handleLogout = () => setCurrentUser(null);

        if (!currentUser) return React.createElement(AuthScreen, { onLogin: handleLogin });
        return React.createElement(GymApp, { username: currentUser, onLogout: handleLogout });
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(Root));
    </script>
